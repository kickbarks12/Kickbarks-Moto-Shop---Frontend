<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhoneHub - Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="page-wrap">
        <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow-sm px-3">
            <div class="container">
                <a class="navbar-brand fw-bold text-warning" href="index.html">📱 PhoneHub</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="mainNav">
                    <div class="ms-auto d-flex flex-wrap gap-2 align-items-center">
                        <a href="index.html" class="btn btn-outline-light btn-sm">Home</a>
                        <a href="shop.html" class="btn btn-outline-warning btn-sm">Shop</a>
                        <a href="cart.html" class="btn btn-outline-light btn-sm">
                            Cart 🛒 <span id="cart-count" class="badge bg-danger">0</span>
                        </a>
                        <div id="auth-area" class="d-flex gap-2"></div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="container py-4">
            <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
                <div>
                    <h1 class="fw-bold mb-1">Shop Phones</h1>
                    <p class="text-muted mb-0">Browse the latest smartphones and deals.</p>
                </div>
            </div>

            <div class="card shadow-sm border-0 rounded-4 mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <input type="text" id="search-input" class="form-control"
                                placeholder="Search name, brand, model">
                        </div>

                        <div class="col-md-2">
                            <select id="brand-filter" class="form-select">
                                <option value="">All Brands</option>
                            </select>
                        </div>

                        <div class="col-md-2">
                            <select id="ram-filter" class="form-select">
                                <option value="">All RAM</option>
                                <option value="4GB">4GB</option>
                                <option value="6GB">6GB</option>
                                <option value="8GB">8GB</option>
                                <option value="12GB">12GB</option>
                                <option value="16GB">16GB</option>
                            </select>
                        </div>

                        <div class="col-md-2">
                            <input type="number" id="price-filter" class="form-control" placeholder="Max Price">
                        </div>

                        <div class="col-md-2 d-grid">
                            <button id="filter-btn" class="btn btn-warning">Apply Filters</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4" id="shop-products"></div>
        </main>

        <footer class="footer">
            <div class="container text-center">
                <p class="mb-0">© 2026 PhoneHub. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <script src="js/config.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/shop.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
