<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Shop - Kickbarks Moto Shop</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- 🔥 NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow-sm px-3">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold text-warning">🏍️ Kickbarks</span>

            <div class="ms-auto d-flex gap-2">
                <a href="index.html" class="btn btn-outline-light">Home</a>
                <a href="shop.html" class="btn btn-outline-warning">Shop</a>

                <a href="cart.html" class="btn btn-outline-light">
                    Cart 🛒 <span id="cart-count" class="badge bg-danger">0</span>
                </a>

                <a href="orders.html" class="btn btn-outline-light">Orders</a>

                <button id="auth-btn" class="btn btn-warning ms-2"></button>
            </div>
        </div>
    </nav>

    <!-- 🔥 HEADER -->
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center">
            <h2 class="fw-bold">🔥 Shop Products</h2>

            <!-- (Future: search bar) -->
            <input type="text" class="form-control w-25" placeholder="Search..." disabled>
        </div>
    </div>

    <!-- 🔄 LOADING -->
    <div id="loading" class="text-center my-5">
        <div class="spinner-border text-warning"></div>
        <p class="mt-2">Loading products...</p>
    </div>

    <!-- ❌ EMPTY -->
    <div id="no-products" class="text-center text-muted d-none">
        <h5>No products found 😢</h5>
    </div>

    <!-- ✅ PRODUCTS GRID -->
    <div class="container pb-5">
        <div id="products" class="row g-4"></div>
    </div>

    <script src="./js/app.js"></script>

</body>

</html>
