<!DOCTYPE html>
<html>

<head>
    <title>Kickbarks Moto Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand">Kickbarks 🏍️</span>

        <div>
            <a href="index.html" class="btn btn-outline-light">Home</a>
            <a href="shop.html" class="btn btn-outline-light">Shop</a>
            <a href="cart.html" class="btn btn-outline-light">
                Cart 🛒 <span id="cart-count" class="badge bg-danger">0</span>
            </a>

            <button id="auth-btn" class="btn btn-warning ms-2"></button>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="text-center">Products</h1>

        <!-- 🔄 Loading -->
        <div id="loading" class="text-center my-5">
            <div class="spinner-border"></div>
            <p>Loading products...</p>
        </div>

        <!-- ❌ No products -->
        <div id="no-products" class="text-center text-muted d-none">
            No products found 😢
        </div>

        <!-- ✅ Products -->
        <div id="products" class="row"></div>
    </div>

    <script src="./js/app.js"></script>
</body>

</html>
