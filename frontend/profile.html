<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhoneHub - Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="page-wrap">
        <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow-sm px-3">
            <div class="container">
                <a class="navbar-brand fw-bold text-warning" href="index.html">📱 PhoneHub</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="mainNav">
                    <div class="ms-auto d-flex flex-wrap gap-2 align-items-center">
                        <a href="index.html" class="btn btn-outline-light btn-sm">Home</a>
                        <a href="shop.html" class="btn btn-outline-warning btn-sm">Shop</a>
                        <a href="cart.html" class="btn btn-outline-light btn-sm">
                            Cart 🛒 <span id="cart-count" class="badge bg-danger">0</span>
                        </a>
                        <div id="auth-area" class="d-flex gap-2"></div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="container py-4">
            <div class="row g-4">
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4 text-center">
                            <div class="profile-avatar mx-auto mb-3" id="profile-avatar">
                                U
                            </div>
                            <h3 class="fw-bold mb-1" id="profile-name">User</h3>
                            <p class="text-muted mb-2" id="profile-email">email@example.com</p>
                            <span class="badge bg-dark" id="profile-role">user</span>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
                                <div>
                                    <h2 class="fw-bold mb-1">My Profile</h2>
                                    <p class="text-muted mb-0">Manage your account details.</p>
                                </div>
                            </div>

                            <div id="profile-alert"></div>

                            <form id="profile-form">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label for="name" class="form-label fw-semibold">Full Name</label>
                                        <input type="text" id="name" class="form-control">
                                    </div>

                                    <div class="col-md-6">
                                        <label for="email" class="form-label fw-semibold">Email</label>
                                        <input type="email" id="email" class="form-control" disabled>
                                    </div>
                                </div>

                                <div class="mt-4 d-flex gap-2 flex-wrap">
                                    <button type="submit" class="btn btn-warning">Save Changes</button>
                                    <a href="orders.html" class="btn btn-outline-dark">View Orders</a>
                                </div>
                            </form>

                            <hr class="my-4">

                            <div>
                                <h5 class="fw-bold mb-3">Account Info</h5>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <div class="profile-info-box">
                                            <span class="profile-info-label">Role</span>
                                            <strong id="account-role">user</strong>
                                        </div>
                                    </div>

                                    <div class="col-md-6">
                                        <div class="profile-info-box">
                                            <span class="profile-info-label">Login Status</span>
                                            <strong>Logged In</strong>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container text-center">
                <p class="mb-0">© 2026 PhoneHub. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <script src="js/config.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/profile.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
