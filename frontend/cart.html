<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Your Cart - Kickbarks</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- 🔥 NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow-sm px-3">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold text-warning">🏍️ Kickbarks</span>

            <div class="ms-auto d-flex gap-2">
                <a href="index.html" class="btn btn-outline-light">Home</a>
                <a href="shop.html" class="btn btn-outline-warning">Shop</a>

                <a href="cart.html" class="btn btn-outline-light">
                    Cart 🛒 <span id="cart-count" class="badge bg-danger">0</span>
                </a>

                <a href="orders.html" class="btn btn-outline-light">Orders</a>

                <button id="auth-btn" class="btn btn-warning ms-2"></button>
            </div>
        </div>
    </nav>

    <!-- 🔥 CART SECTION -->
    <div class="container py-5">

        <h2 class="fw-bold mb-4">🛒 Your Cart</h2>

        <div class="row">
            <!-- CART ITEMS -->
            <div class="col-lg-8">
                <div id="cart" class="list-group shadow-sm"></div>

                <!-- EMPTY -->
                <div id="empty-cart" class="text-center text-muted mt-4 d-none">
                    <h5>Your cart is empty 😢</h5>
                    <a href="shop.html" class="btn btn-warning mt-2">Go Shopping</a>
                </div>
            </div>

            <!-- SUMMARY -->
            <div class="col-lg-4">
                <div class="card shadow-sm p-3">
                    <h5 class="fw-bold">Order Summary</h5>
                    <hr>

                    <p class="d-flex justify-content-between">
                        <span>Total</span>
                        <strong>₱<span id="total">0</span></strong>
                    </p>

                    <button onclick="goCheckout()" class="btn btn-success w-100 mt-3">
                        Checkout
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script src="./js/cart.js"></script>
    <script src="./js/app.js"></script>

</body>

</html>
