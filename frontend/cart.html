<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhoneHub - Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="page-wrap">
        <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow-sm px-3">
            <div class="container">
                <a class="navbar-brand fw-bold text-warning" href="index.html">📱 PhoneHub</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="mainNav">
                    <div class="ms-auto d-flex flex-wrap gap-2 align-items-center">
                        <a href="index.html" class="btn btn-outline-light btn-sm">Home</a>
                        <a href="shop.html" class="btn btn-outline-warning btn-sm">Shop</a>
                        <a href="cart.html" class="btn btn-outline-light btn-sm">
                            Cart 🛒 <span id="cart-count" class="badge bg-danger">0</span>
                        </a>
                        <div id="auth-area" class="d-flex gap-2"></div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="container py-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
                <div>
                    <h1 class="fw-bold mb-1">Your Cart</h1>
                    <p class="text-muted mb-0">Review your selected phones before checkout.</p>
                </div>
                <a href="shop.html" class="btn btn-outline-dark">Continue Shopping</a>
            </div>

            <div class="row g-4">
                <div class="col-lg-8">
                    <div id="cart-items"></div>
                </div>

                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <h4 class="fw-bold mb-3">Order Summary</h4>

                            <div class="d-flex justify-content-between mb-2">
                                <span>Total Items</span>
                                <strong id="summary-items">0</strong>
                            </div>

                            <div class="d-flex justify-content-between mb-3">
                                <span>Total Amount</span>
                                <strong class="text-warning" id="summary-total">₱0</strong>
                            </div>

                            <div class="d-grid gap-2">
                                <button id="checkout-btn" class="btn btn-warning btn-lg">Checkout</button>
                                <a href="shop.html" class="btn btn-outline-dark">Add More Products</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container text-center">
                <p class="mb-0">© 2026 PhoneHub. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <script src="js/config.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/cart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
