<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Kickbarks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-black px-3">
        <span class="navbar-brand text-warning fw-bold">⚙️ Admin Panel</span>

        <a href="admin-orders.html" class="btn btn-outline-light">Orders</a>
    </nav>

    <div class="container py-5">

        <h3 class="mb-4">📦 Manage Products</h3>

        <!-- ADD PRODUCT -->
        <div class="card p-3 mb-4 shadow-sm">
            <h5>Add Product</h5>

            <input id="name" class="form-control mb-2" placeholder="Product Name">
            <input id="price" type="number" class="form-control mb-2" placeholder="Price">
            <input id="image" class="form-control mb-2" placeholder="Image URL">

            <button onclick="addProduct()" class="btn btn-warning">
                Add Product
            </button>
        </div>

        <!-- PRODUCT LIST -->
        <div id="admin-products" class="row g-4"></div>

    </div>

    <script src="./js/admin.js"></script>
    <script src="./js/app.js"></script>

</body>

</html>
