<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Orders - Kickbarks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black px-3">
        <span class="navbar-brand fw-bold text-warning">📦 My Orders</span>

        <div class="ms-auto d-flex gap-2">
            <a href="index.html" class="btn btn-outline-light">Home</a>
            <a href="shop.html" class="btn btn-outline-warning">Shop</a>
        </div>
    </nav>

    <div class="container py-5">

        <h3 class="mb-4 fw-bold">Your Orders</h3>

        <!-- LOADING -->
        <div id="loading" class="text-center">
            <div class="spinner-border text-warning"></div>
            <p>Loading orders...</p>
        </div>

        <!-- EMPTY -->
        <div id="empty-orders" class="text-center text-muted d-none">
            <h5>No orders yet 😢</h5>
            <a href="shop.html" class="btn btn-warning mt-2">Start Shopping</a>
        </div>

        <!-- ORDERS -->
        <div id="orders-container" class="d-flex flex-column gap-4"></div>

    </div>

    <script src="./js/orders.js"></script>
    <script src="./js/app.js"></script>

</body>

</html>
