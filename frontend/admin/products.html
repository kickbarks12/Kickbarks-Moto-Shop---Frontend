<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kickbarks Admin - Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body class="admin-body">
    <div class="admin-page-wrap">
        <nav class="navbar navbar-expand-lg navbar-dark admin-navbar px-3">
            <div class="container">
                <a class="navbar-brand admin-brand" href="../index.html">🏍️ Kickbarks Admin</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="adminNav">
                    <div class="ms-auto d-flex flex-wrap gap-2 align-items-center admin-nav-actions">
                        <a href="../index.html" class="btn btn-outline-light btn-sm">Customer Site</a>
                        <a href="./dashboard.html" class="btn btn-outline-light btn-sm">Dashboard</a>
                        <a href="./products.html" class="btn btn-warning btn-sm">Products</a>
                        <a href="./order.html" class="btn btn-outline-light btn-sm">Orders</a>
                        <a href="./users.html" class="btn btn-outline-light btn-sm">Users</a>
                        <a href="./vouchers.html" class="btn btn-outline-light btn-sm">Vouchers</a>
                        <button id="admin-logout-btn" class="btn btn-danger btn-sm">Logout</button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="container py-4 admin-main">
            <div class="admin-hero">
                <h1>Manage Products</h1>
                <p class="admin-subtext">Add and manage your store products.</p>
            </div>

            <div id="admin-products-alert" class="admin-alert"></div>

            <div class="card admin-card mb-4">
                <div class="card-body">
                    <h4 class="fw-bold mb-3">Add New Product</h4>

                    <form id="product-form" class="admin-form" enctype="multipart/form-data">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Product Name</label>
                                <input type="text" id="name" class="form-control" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Brand</label>
                                <input type="text" id="brand" class="form-control" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Model</label>
                                <input type="text" id="model" class="form-control" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Category</label>
                                <input type="text" id="category" class="form-control" value="Smartphone">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Price</label>
                                <input type="number" id="price" class="form-control" min="0" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Stock</label>
                                <input type="number" id="stock" class="form-control" min="0" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Color</label>
                                <input type="text" id="color" class="form-control">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">RAM</label>
                                <input type="text" id="ram" class="form-control" placeholder="8GB">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Storage</label>
                                <input type="text" id="storage" class="form-control" placeholder="256GB">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Battery</label>
                                <input type="text" id="battery" class="form-control" placeholder="5000mAh">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Screen Size</label>
                                <input type="text" id="screenSize" class="form-control" placeholder="6.7 inches">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Camera</label>
                                <input type="text" id="camera" class="form-control" placeholder="50MP">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Chipset</label>
                                <input type="text" id="chipset" class="form-control">
                            </div>

                            <div class="col-12">
                                <label class="form-label">Description</label>
                                <textarea id="description" class="form-control" rows="4"></textarea>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Product Image</label>
                                <input type="file" id="image" class="form-control" accept="image/*">
                            </div>

                            <div class="col-md-6 d-flex align-items-center">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox" id="featured">
                                    <label class="form-check-label fw-semibold" for="featured">Featured Product</label>
                                </div>
                            </div>

                            <div class="col-12 d-grid d-md-flex gap-2">
                                <button type="submit" id="save-product-btn" class="btn admin-btn-gold">Save
                                    Product</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card admin-card">
                <div class="card-body">
                    <h4 class="fw-bold mb-3">Product List</h4>

                    <div class="table-responsive admin-table-wrap">
                        <table class="table admin-table align-middle">
                            <thead>
                                <tr>
                                    <th>Image</th>
                                    <th>Name</th>
                                    <th>Brand</th>
                                    <th>Price</th>
                                    <th>Stock</th>
                                    <th>Featured</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="products-table-body">
                                <tr>
                                    <td colspan="7" class="text-center text-muted">Loading products...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <footer class="admin-footer">
            <div class="container text-center">
                <p class="mb-0">© 2026 Kickbarks Admin Panel</p>
            </div>
        </footer>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/admin/admin-products.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
