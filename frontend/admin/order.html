<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhoneHub Admin - Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div class="page-wrap">
        <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow-sm px-3">
            <div class="container">
                <a class="navbar-brand fw-bold text-warning" href="../index.html">📱 PhoneHub Admin</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="adminNav">
                    <div class="ms-auto d-flex flex-wrap gap-2 align-items-center">
                        <a href="../index.html" class="btn btn-outline-light btn-sm">Customer Site</a>
                        <a href="dashboard.html" class="btn btn-outline-light btn-sm">Dashboard</a>
                        <a href="products.html" class="btn btn-outline-light btn-sm">Products</a>
                        <a href="orders.html" class="btn btn-warning btn-sm">Orders</a>
                        <button id="admin-logout-btn" class="btn btn-danger btn-sm">Logout</button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="container py-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
                <div>
                    <h1 class="fw-bold mb-1">Manage Orders</h1>
                    <p class="text-muted mb-0">Review customer orders and update order status.</p>
                </div>
            </div>

            <div id="admin-orders-alert"></div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <div class="table-responsive">
                        <table class="table align-middle" id="admin-orders-table">
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Date</th>
                                    <th>Items</th>
                                    <th>Total</th>
                                    <th>Status</th>
                                    <th>Update</th>
                                </tr>
                            </thead>
                            <tbody id="admin-orders-table-body">
                                <tr>
                                    <td colspan="6" class="text-center text-muted">Loading orders...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container text-center">
                <p class="mb-0">© 2026 PhoneHub Admin Panel</p>
            </div>
        </footer>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/admin/admin-orders.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
