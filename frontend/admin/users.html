<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kickbarks Admin - Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body class="admin-body">
    <div class="admin-page-wrap">
        <nav class="navbar navbar-expand-lg navbar-dark admin-navbar px-3">
            <div class="container">
                <a class="navbar-brand admin-brand" href="../index.html">🏍️ Kickbarks Admin</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="adminNav">
                    <div class="ms-auto d-flex flex-wrap gap-2 align-items-center admin-nav-actions">
                        <a href="../index.html" class="btn btn-outline-light btn-sm">Customer Site</a>
                        <a href="./dashboard.html" class="btn btn-outline-light btn-sm">Dashboard</a>
                        <a href="./products.html" class="btn btn-outline-light btn-sm">Products</a>
                        <a href="./order.html" class="btn btn-outline-light btn-sm">Orders</a>
                        <a href="./users.html" class="btn btn-warning btn-sm">Users</a>
                        <a href="./vouchers.html" class="btn btn-outline-light btn-sm">Vouchers</a>
                        <button id="admin-logout-btn" class="btn btn-danger btn-sm">Logout</button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="container py-4 admin-main">
            <div class="admin-hero">
                <h1>User Management</h1>
                <p class="admin-subtext">View customer accounts and status.</p>
            </div>

            <div id="admin-users-alert" class="admin-alert"></div>

            <div class="row g-4 mb-4">
                <div class="col-md-4">
                    <div class="card admin-card h-100">
                        <div class="card-body">
                            <p class="admin-stat-label">Total Users</p>
                            <h2 class="admin-stat-value" id="total-users">0</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card admin-card h-100">
                        <div class="card-body">
                            <p class="admin-stat-label">Active Users</p>
                            <h2 class="admin-stat-value" id="active-users">0</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card admin-card h-100">
                        <div class="card-body">
                            <p class="admin-stat-label">Blocked Users</p>
                            <h2 class="admin-stat-value" id="blocked-users">0</h2>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card admin-card">
                <div class="card-body">
                    <div class="table-responsive admin-table-wrap">
                        <table class="table admin-table align-middle">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="users-table-body">
                                <tr>
                                    <td colspan="3" class="text-center text-muted">Loading users...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <footer class="admin-footer">
            <div class="container text-center">
                <p class="mb-0">© 2026 Kickbarks Admin Panel</p>
            </div>
        </footer>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/admin/admin-users.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
