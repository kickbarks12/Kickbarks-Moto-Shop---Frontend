<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kickbarks Admin - Vouchers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body class="admin-body">
    <div class="admin-page-wrap">
        <nav class="navbar navbar-expand-lg navbar-dark admin-navbar px-3">
            <div class="container">
                <a class="navbar-brand admin-brand" href="../index.html">🏍️ Kickbarks Admin</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="adminNav">
                    <div class="ms-auto d-flex flex-wrap gap-2 align-items-center admin-nav-actions">
                        <a href="../index.html" class="btn btn-outline-light btn-sm">Customer Site</a>
                        <a href="./dashboard.html" class="btn btn-outline-light btn-sm">Dashboard</a>
                        <a href="./products.html" class="btn btn-outline-light btn-sm">Products</a>
                        <a href="./order.html" class="btn btn-outline-light btn-sm">Orders</a>
                        <a href="./users.html" class="btn btn-outline-light btn-sm">Users</a>
                        <a href="./vouchers.html" class="btn btn-warning btn-sm">Vouchers</a>
                        <button id="admin-logout-btn" class="btn btn-danger btn-sm">Logout</button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="container py-4 admin-main">
            <div class="admin-hero">
                <h1>Voucher Management</h1>
                <p class="admin-subtext">Create and review store vouchers.</p>
            </div>

            <div id="admin-vouchers-alert" class="admin-alert"></div>

            <div class="card admin-card mb-4">
                <div class="card-body">
                    <h4 class="fw-bold mb-3">Create Voucher</h4>

                    <form id="voucher-form" class="admin-form">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">Voucher Code</label>
                                <input type="text" id="code" class="form-control" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Discount Type</label>
                                <select id="discountType" class="form-select">
                                    <option value="fixed">Fixed</option>
                                    <option value="percent">Percent</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Discount Value</label>
                                <input type="number" id="discountValue" class="form-control" min="1" required>
                            </div>

                            <div class="col-12 d-grid d-md-flex gap-2">
                                <button type="submit" id="create-voucher-btn" class="btn admin-btn-gold">Create
                                    Voucher</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card admin-card">
                <div class="card-body">
                    <div class="table-responsive admin-table-wrap">
                        <table class="table admin-table align-middle">
                            <thead>
                                <tr>
                                    <th>Code</th>
                                    <th>Type</th>
                                    <th>Value</th>
                                </tr>
                            </thead>
                            <tbody id="voucher-table-body">
                                <tr>
                                    <td colspan="3" class="text-center text-muted">Loading vouchers...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <footer class="admin-footer">
            <div class="container text-center">
                <p class="mb-0">© 2026 Kickbarks Admin Panel</p>
            </div>
        </footer>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/admin/admin-vouchers.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
