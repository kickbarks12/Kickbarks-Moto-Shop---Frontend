<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kickbarks Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body class="admin-body">

    <div class="container admin-login-wrap py-4">
        <div class="row justify-content-center w-100">
            <div class="col-lg-5 col-md-7">
                <div class="card admin-login-card">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <h2 class="admin-login-title">🏍️ Kickbarks Admin</h2>
                            <p class="admin-login-subtitle">Login to manage products, orders, users, and vouchers.</p>
                        </div>

                        <div id="admin-login-alert" class="admin-alert mb-3"></div>

                        <form id="admin-login-form" class="admin-form">
                            <div class="mb-3">
                                <label for="admin-email" class="form-label">Email</label>
                                <input type="email" id="admin-email" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label for="admin-password" class="form-label">Password</label>
                                <input type="password" id="admin-password" class="form-control" required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" id="admin-login-btn" class="btn admin-btn-gold">
                                    Admin Login
                                </button>
                            </div>
                        </form>

                        <div class="text-center mt-3">
                            <a href="../login.html">Go to Customer Login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/admin/admin-login.js"></script>
</body>

</html>
