<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhoneHub - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="page-wrap">
        <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow-sm px-3">
            <div class="container">
                <a class="navbar-brand fw-bold text-warning" href="index.html">📱 PhoneHub</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="mainNav">
                    <div class="ms-auto d-flex flex-wrap gap-2 align-items-center">
                        <a href="index.html" class="btn btn-outline-light btn-sm">Home</a>
                        <a href="shop.html" class="btn btn-outline-warning btn-sm">Shop</a>
                        <a href="cart.html" class="btn btn-outline-light btn-sm">
                            Cart 🛒 <span id="cart-count" class="badge bg-danger">0</span>
                        </a>
                        <div id="auth-area" class="d-flex gap-2"></div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4 p-md-5">
                            <div class="text-center mb-4">
                                <h1 class="fw-bold mb-2">Create Account</h1>
                                <p class="text-muted mb-0">Register to start shopping for phones.</p>
                            </div>

                            <div id="register-alert"></div>

                            <form id="register-form">
                                <div class="mb-3">
                                    <label for="name" class="form-label fw-semibold">Full Name</label>
                                    <input type="text" id="name" class="form-control" required>
                                </div>

                                <div class="mb-3">
                                    <label for="email" class="form-label fw-semibold">Email</label>
                                    <input type="email" id="email" class="form-control" required>
                                </div>

                                <div class="mb-3">
                                    <label for="password" class="form-label fw-semibold">Password</label>
                                    <input type="password" id="password" class="form-control" required>
                                </div>

                                <div class="mb-3">
                                    <label for="confirm-password" class="form-label fw-semibold">Confirm
                                        Password</label>
                                    <input type="password" id="confirm-password" class="form-control" required>
                                </div>

                                <div class="d-grid">
                                    <button type="submit" id="register-btn"
                                        class="btn btn-warning btn-lg">Register</button>
                                </div>
                            </form>

                            <p class="text-center mt-4 mb-0">
                                Already have an account?
                                <a href="login.html" class="fw-semibold text-decoration-none">Login here</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container text-center">
                <p class="mb-0">© 2026 PhoneHub. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <script src="js/config.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/register.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
