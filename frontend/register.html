<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register - Kickbarks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-light">

    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow p-4" style="width: 350px; border-radius: 12px;">

            <h3 class="text-center mb-3 fw-bold">📝 Register</h3>

            <input id="name" class="form-control mb-2" placeholder="Full Name">
            <input id="email" class="form-control mb-2" placeholder="Email">
            <input id="password" type="password" class="form-control mb-3" placeholder="Password">

            <button onclick="register()" class="btn btn-warning w-100">
                Create Account
            </button>

            <p class="text-center mt-3 mb-0">
                Already have an account? <a href="login.html">Login</a>
            </p>

        </div>
    </div>

    <script src="./js/auth.js"></script>
</body>

</html>
